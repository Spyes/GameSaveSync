<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Save Sync</title>
<style>
  :root {
    --bg: #0f1115; --panel: #191c22; --panel2: #21252d; --border: #2c313b;
    --text: #e6e8ec; --muted: #9aa3af; --accent: #4f8cff; --accent2: #2ecc71;
    --danger: #ff5c5c; --radius: 10px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f7; --panel: #ffffff; --panel2: #f0f2f5; --border: #dfe3ea;
      --text: #1b1f27; --muted: #6b7280; --accent: #2563eb;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--text); }
  .wrap { max-width: 820px; margin: 0 auto; padding: 24px 16px 64px; }
  h1 { font-size: 22px; margin: 0; }
  h2 { font-size: 15px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 28px 0 10px; }
  .top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .device { color: var(--muted); font-size: 13px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 8px 0 4px; }
  input, textarea { width: 100%; padding: 9px 11px; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; font: inherit; }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  button { padding: 9px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel2);
    color: var(--text); font: inherit; font-weight: 600; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: .55; cursor: default; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.up { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.down { background: var(--accent2, #2ecc71); border-color: var(--accent2, #2ecc71); color: #06210f; }
  button.link { background: none; border: none; color: var(--muted); padding: 4px 6px; font-weight: 500; }
  button.link:hover { color: var(--text); }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px; }
  .card h3 { margin: 0 0 2px; font-size: 17px; }
  .meta { color: var(--muted); font-size: 13px; word-break: break-all; }
  .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .status { font-size: 13px; margin-top: 10px; padding: 8px 10px; border-radius: 8px; display: none; }
  .status.ok { display: block; background: rgba(46,204,113,.12); color: #2ecc71; }
  .status.err { display: block; background: rgba(255,92,92,.12); color: var(--danger); white-space: pre-wrap; }
  .versions { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; display: none; }
  .versions.show { display: block; }
  .ver { font-size: 13px; padding: 6px 0; border-bottom: 1px dashed var(--border); }
  .ver:last-child { border-bottom: none; }
  .ver code { color: var(--accent); }
  .ver .when { color: var(--muted); }
  .hint { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
    border-radius: 50%; display: inline-block; animation: spin .7s linear infinite; vertical-align: -2px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { color: var(--muted); padding: 20px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>💾 Save Sync</h1>
    <span class="device" id="device"></span>
  </div>

  <h2>GitHub access</h2>
  <div class="panel">
    <label for="token">Personal access token <span id="tokenState" class="device"></span></label>
    <div class="row">
      <input id="token" type="password" placeholder="ghp_… (needs 'repo' scope for private repos)" style="flex:1 1 260px" />
      <button class="primary" id="saveToken">Save token</button>
    </div>
    <div class="hint">Stored locally on this device only, in save-sync's config file. Needed to push commits and to read private repos.</div>
  </div>

  <h2>Your saves</h2>
  <div id="list"></div>

  <h2>Add a save</h2>
  <div class="panel">
    <label for="name">Name (also the folder name inside the repo)</label>
    <input id="name" placeholder="e.g. Elden Ring" />
    <label for="repo">GitHub repo URL</label>
    <input id="repo" placeholder="https://github.com/you/game-saves.git" />
    <label for="path">Local save folder (full path)</label>
    <input id="path" placeholder="C:\Users\you\AppData\... or /home/deck/.local/share/..." />
    <div class="row" style="margin-top:12px">
      <button class="primary" id="addSync">Add save</button>
    </div>
    <div class="status" id="addStatus"></div>
  </div>
</div>

<script>
const api = async (method, url, body) => {
  const res = await fetch(url, {
    method,
    headers: body ? { "Content-Type": "application/json" } : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
};

const el = (tag, props = {}, children = []) => {
  const n = Object.assign(document.createElement(tag), props);
  for (const c of [].concat(children)) if (c) n.append(c);
  return n;
};

let statusInfo = { device: "", hasToken: false };

async function loadStatus() {
  statusInfo = await api("GET", "/api/status");
  document.getElementById("device").textContent = "this device: " + statusInfo.device;
  document.getElementById("tokenState").textContent = statusInfo.hasToken ? "· saved ✓" : "· not set";
}

function setBtnBusy(btn, busy, label) {
  btn.disabled = busy;
  btn.innerHTML = busy ? '<span class="spinner"></span> ' + label : label;
}

function showStatus(node, msg, ok) {
  node.className = "status " + (ok ? "ok" : "err");
  node.textContent = msg;
}

async function loadSyncs() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  const syncs = await api("GET", "/api/syncs");
  if (!syncs.length) {
    list.append(el("div", { className: "empty", textContent: "No saves yet — add one below." }));
    return;
  }
  for (const s of syncs) list.append(renderCard(s));
}

function renderCard(s) {
  const status = el("div", { className: "status" });
  const versions = el("div", { className: "versions" });

  const uploadBtn = el("button", { className: "up", textContent: "⬆ Upload save" });
  const downloadBtn = el("button", { className: "down", textContent: "⬇ Download save" });
  const versionsBtn = el("button", { className: "link", textContent: "Versions" });
  const deleteBtn = el("button", { className: "link", textContent: "Remove", style: "margin-left:auto" });
  const note = el("input", { placeholder: "optional note for this upload", style: "flex:1 1 200px" });

  uploadBtn.onclick = async () => {
    setBtnBusy(uploadBtn, true, "Uploading");
    status.className = "status";
    try {
      const r = await api("POST", `/api/syncs/${s.id}/upload`, { note: note.value });
      showStatus(status, r.result, true);
      note.value = "";
      if (versions.classList.contains("show")) loadVersions(s, versions);
    } catch (e) { showStatus(status, e.message, false); }
    setBtnBusy(uploadBtn, false, "⬆ Upload save");
  };

  downloadBtn.onclick = async () => {
    if (!confirm(`Download will overwrite the local folder for "${s.name}" with the latest version from GitHub. Continue?`)) return;
    setBtnBusy(downloadBtn, true, "Downloading");
    status.className = "status";
    try {
      const r = await api("POST", `/api/syncs/${s.id}/download`);
      showStatus(status, r.result, true);
    } catch (e) { showStatus(status, e.message, false); }
    setBtnBusy(downloadBtn, false, "⬇ Download save");
  };

  versionsBtn.onclick = () => {
    versions.classList.toggle("show");
    if (versions.classList.contains("show")) loadVersions(s, versions);
  };

  deleteBtn.onclick = async () => {
    if (!confirm(`Remove "${s.name}" from this list? (Your files and GitHub history are not deleted.)`)) return;
    await api("DELETE", `/api/syncs/${s.id}`);
    loadSyncs();
  };

  const card = el("div", { className: "card" }, [
    el("h3", { textContent: s.name }),
    el("div", { className: "meta", textContent: s.repoUrl }),
    el("div", { className: "meta", textContent: s.localPath }),
    el("div", { className: "actions" }, [uploadBtn, downloadBtn, note]),
    el("div", { className: "actions" }, [versionsBtn, deleteBtn]),
    status,
    versions,
  ]);
  if (s.lastAction) showStatus(status, "Last: " + s.lastAction, true);
  return card;
}

async function loadVersions(s, node) {
  node.innerHTML = '<div class="ver when">Loading history…</div>';
  try {
    const vs = await api("GET", `/api/syncs/${s.id}/history`);
    node.innerHTML = "";
    if (!vs.length) { node.append(el("div", { className: "ver when", textContent: "No versions yet." })); return; }
    for (const v of vs) {
      node.append(el("div", { className: "ver" }, [
        el("code", { textContent: v.short }),
        el("span", { textContent: "  " + v.message + "  " }),
        el("span", { className: "when", textContent: new Date(v.when).toLocaleString() }),
      ]));
    }
  } catch (e) {
    node.innerHTML = "";
    node.append(el("div", { className: "ver when", textContent: "Could not load history: " + e.message }));
  }
}

document.getElementById("saveToken").onclick = async () => {
  const btn = document.getElementById("saveToken");
  setBtnBusy(btn, true, "Saving");
  try {
    await api("POST", "/api/settings/token", { token: document.getElementById("token").value });
    document.getElementById("token").value = "";
    await loadStatus();
  } catch (e) { alert(e.message); }
  setBtnBusy(btn, false, "Save token");
};

document.getElementById("addSync").onclick = async () => {
  const status = document.getElementById("addStatus");
  status.className = "status";
  const body = {
    name: document.getElementById("name").value,
    repoUrl: document.getElementById("repo").value,
    localPath: document.getElementById("path").value,
  };
  try {
    await api("POST", "/api/syncs", body);
    document.getElementById("name").value = "";
    document.getElementById("repo").value = "";
    document.getElementById("path").value = "";
    showStatus(status, "Added.", true);
    loadSyncs();
  } catch (e) { showStatus(status, e.message, false); }
};

loadStatus();
loadSyncs();
</script>
</body>
</html>
