name: release

# Build and publish binaries whenever a version tag is pushed, e.g.
#   git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p build
          build() { GOOS=$1 GOARCH=$2 go build -ldflags="-s -w" -o "build/$3" . ; }
          build windows amd64 save-sync-windows-amd64.exe
          build linux   amd64 save-sync-linux-amd64
          build darwin  arm64 save-sync-macos-arm64
          build darwin  amd64 save-sync-macos-amd64
          ls -lh build/

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" build/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
